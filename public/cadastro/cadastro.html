<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Mercado Fácil</title>
  <link rel="stylesheet" href="../padrao.css" />
  <link rel="stylesheet" href="cadastro.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="page-header">
        <span class="logo">🛍️ Mercado Fácil</span>
        <h1 class="page-title">Criar conta</h1>
        <p class="page-subtitle">Cadastre-se para começar a comprar</p>
      </div>

      <div class="input-group">
        <label for="usuario">Usuário</label>
        <input id="usuario" type="text" class="input-field" placeholder="Crie um nome de usuário" autocomplete="username" />
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input id="senha" type="password" class="input-field" placeholder="Crie uma senha" autocomplete="new-password" />
      </div>

      <div class="input-group">
        <label for="confirmar">Confirmar Senha</label>
        <input id="confirmar" type="password" class="input-field" placeholder="Repita a senha" autocomplete="new-password" />
      </div>

      <button class="btn btn-verde">Cadastrar</button>

      <a class="link-texto" href="../Login/login.html">Já tem conta? Faça login</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="cadastro.js"></script>
</body>
</html>
