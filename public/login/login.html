<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Mercado Fácil</title>
  <link rel="stylesheet" href="../padrao.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="page-header">
        <span class="logo">🛍️ Mercado Fácil</span>
        <h1 class="page-title">Bem-vindo de volta!</h1>
        <p class="page-subtitle">Faça login para continuar comprando</p>
      </div>

      <div class="input-group">
        <label for="usuario">Usuário</label>
        <input id="usuario" type="text" class="input-field" placeholder="Digite seu usuário" autocomplete="username" />
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input id="senha" type="password" class="input-field" placeholder="Digite sua senha" autocomplete="current-password" />
      </div>

      <button class="btn btn-verde" id="btnEntrar"Entrar</button>

      <a class="link-texto" href="../Cadastro/cadastro.html">Não tem conta? Cadastre-se</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="login.js"></script>
</body>
</html>
